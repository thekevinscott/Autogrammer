<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>{{ docsanova.title }}</title>
    <style type="text/css">
      code-editor:not(:defined) { visibility: hidden; }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="{{ '/styles/reset.css' | url | bust }}" />
    <link rel="stylesheet" href="{{ '/styles/github-markdown.css' | url | bust }}" />
    <link rel="stylesheet" href="{{ '/styles/variables.css' | url | bust }}" />
    <link rel="stylesheet" href="{{ '/styles/style.css' | url | bust }}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace/dist/themes/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace/dist/themes/dark.css" />
    <script type="importmap">
      {
        "imports": {
          "autogrammer": "/_nm/bundled-autogrammer/dist/index.js",

          "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers/dist/transformers.min.js",
          "@vanillawc/wc-codemirror": "/_nm/@vanillawc/wc-codemirror/index.js",
          "@vanillawc/": "/_nm/@vanillawc/",
          "@lit/reactive-element": "/_nm/@lit/reactive-element/reactive-element.js",
          "@lit/": "/_nm/@lit/",
          "lit-element": "/_nm/lit-element/index.js",
          "lit-element/lit-element.js": "/_nm/lit-element/lit-element.js",
          "lit-html": "/_nm/lit-html/lit-html.js",
          "lit-html/": "/_nm/lit-html/",
          "lit": "/_nm/lit/index.js",
          "lit/": "/_nm/lit/",
          "@shoelace-style/": "https://cdn.jsdelivr.net/npm/@shoelace-style/",
          "@docsearch/js": "/_nm/@docsearch/js/dist/esm/index.js",
          "@alenaksu/json-viewer": "/_nm/@alenaksu/json-viewer/dist/json-viewer.js"
        }
      }
      </script>

      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@docsearch/css@3"/></pre></li>
      <link rel="expect" blocking="render" href="main">

  </head>
  <body>
    <script type="module">
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      document.body.classList.add(`sl-theme-${theme}`);
    </script>
    {% include "partials/head.html" %}
    <div id="container">
      {% block content %}{% endblock %}
    </div>
    <!-- <script async=false defer=false type="module" src="/_internal_js/spa.js"></script> -->
    <script async=false defer=false type="module" src="/_internal_js/aside.js"></script>
    <script async=false defer=false type="module" src="/js/index.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@docsearch/js@3"></script>
    <script type="module">
      document.addEventListener('DOMContentLoaded', () => {
        // nav.html
        document.querySelectorAll('nav button').forEach((button) => {
          button.addEventListener('click', () => {
            const li = button.closest('li');
            if (li) {
              li.classList.toggle('open');
            }
          });
        });
        // page.html
        const toggleToc = document.getElementById('toggle-toc');
        const tocMobile = document.getElementById('toc-mobile');
        toggleToc.addEventListener('click', () => {
          tocMobile.classList.toggle('open');
        });
        // head.html
        const backToMainMenuButton = document.getElementById('back-to-main-menu');
        backToMainMenuButton.addEventListener('click', () => {
          backToMainMenuButton.closest('main').classList.add('main-menu');
        });
        // head.html
        docsearch({
          container: '#docsearch',
          appId: 'LQ7FIB4N3D',
          indexName: 'autogrammer',
          apiKey: 'eb51b2e714c17a48ecb3fbf2cc18841b',
        });
        // head.html
        const hamburgerButton = document.getElementById('hamburger');
        const hamburgerMenu = document.getElementById('hamburger-menu');
        const closeHamburgerButton = document.getElementById('close-hamburger');
        const hamburgerOverlay = document.getElementById('hamburger-menu-overlay');

        function close() {
          hamburgerButton.setAttribute('aria-expanded', 'false');
          hamburgerMenu.classList.remove('open');
          backToMainMenuButton.closest('main').classList.remove('main-menu');
        }

        hamburgerButton.addEventListener('click', () => {
          if (hamburgerButton.getAttribute('aria-expanded') === 'false') {
            hamburgerButton.setAttribute('aria-expanded', 'true');
            hamburgerMenu.classList.add('open');
          } else {
            close();
          }
        });

        closeHamburgerButton.addEventListener('click', close);
        hamburgerOverlay.addEventListener('click', close);
      });
    </script>
  </body>
</html>
