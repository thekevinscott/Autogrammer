<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>{{ docsanova.title }}</title>
    <style type="text/css">
      code-editor:not(:defined) { visibility: hidden; }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="{{ '/styles/reset.css' | url | bust }}" />
    <link rel="stylesheet" href="{{ '/styles/github-markdown.css' | url | bust }}" />
    <link rel="stylesheet" href="{{ '/styles/variables.css' | url | bust }}" />
    <link rel="stylesheet" href="{{ '/styles/style.css' | url | bust }}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace/dist/themes/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace/dist/themes/dark.css" />
    <script type="importmap">
      {
        "imports": {
          "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers/dist/transformers.min.js",
          "@vanillawc/wc-codemirror": "https://cdn.jsdelivr.net/npm/@vanillawc/wc-codemirror/index.js",
          "@vanillawc/": "https://cdn.jsdelivr.net/npm/@vanillawc/",
          "@lit/reactive-element": "https://cdn.jsdelivr.net/npm/@lit/reactive-element/reactive-element.js",
          "@lit/": "https://cdn.jsdelivr.net/npm/@lit/",
          "lit-element": "https://cdn.jsdelivr.net/npm/lit-element/index.js",
          "lit-element/lit-element.js": "https://cdn.jsdelivr.net/npm/lit-element/lit-element.js",
          "lit-html": "https://cdn.jsdelivr.net/npm/lit-html/lit-html.js",
          "lit-html/": "https://cdn.jsdelivr.net/npm/lit-html/",
          "lit": "https://cdn.jsdelivr.net/npm/lit/index.js",
          "lit/": "https://cdn.jsdelivr.net/npm/lit/",
          "@shoelace-style/": "https://cdn.jsdelivr.net/npm/@shoelace-style/",
          "@docsearch/js": "https://cdn.jsdelivr.net/npm/@docsearch/js/dist/esm/index.js",
          "@alenaksu/json-viewer": "https://cdn.jsdelivr.net/npm/@alenaksu/json-viewer/dist/json-viewer.js"
        }
      }
      </script>

      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@docsearch/css@3"/></pre></li>
      <link rel="expect" blocking="render" href="main">

  </head>
  <body>
    <script type="module">
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      document.body.classList.add(`sl-theme-${theme}`);
    </script>
    {% include "partials/head.html" %}
    <div id="container">
      {% block content %}{% endblock %}
    </div>
    <!-- <script async=false defer=false type="module" src="/_internal_js/spa.js"></script> -->

    <script src="https://cdn.jsdelivr.net/npm/@docsearch/js@3"></script>
    <script async=false defer=false type="module" src="/_internal_js/script.js"></script>
    <script async=false defer=false type="module" src="/js/index.js"></script>
    <script defer data-domain="autogrammer.dev" src="https://plausible.io/js/script.js"></script>
  </body>
</html>
